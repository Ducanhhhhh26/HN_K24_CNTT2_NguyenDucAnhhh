<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4 text-center">Task Form</h1>
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/tasks}" th:object="${taskItem}" method="post">
                        <div class="mb-3">
                            <label class="form-label">ID:</label>
                            <input type="text" th:field="*{id}" class="form-control" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title:</label>
                            <input type="text" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" />
                            <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Deadline (YYYY-MM-DD):</label>
                            <input type="date" th:field="*{deadline}" class="form-control" th:classappend="${#fields.hasErrors('deadline')} ? 'is-invalid' : ''" />
                            <div th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}" class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority:</label>
                            <select th:field="*{priority}" class="form-select" th:classappend="${#fields.hasErrors('priority')} ? 'is-invalid' : ''">
                                <option value="">--Select--</option>
                                <option value="HIGH">HIGH</option>
                                <option value="MEDIUM">MEDIUM</option>
                                <option value="LOW">LOW</option>
                            </select>
                            <div th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}" class="invalid-feedback"></div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success">Save Task</button>
                            <a th:href="@{/tasks}" class="btn btn-secondary">Back to list</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
