<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Task List</h1>
    <a th:href="@{/tasks/new}" class="btn btn-primary mb-3">Add New Task</a>
    <table class="table table-bordered table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Deadline</th>
                <th>Priority</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.deadline}"></td>
                <td>
                    <span th:if="${task.priority == 'HIGH'}" class="badge bg-danger">HIGH</span>
                    <span th:if="${task.priority == 'MEDIUM'}" class="badge bg-warning text-dark">MEDIUM</span>
                    <span th:if="${task.priority == 'LOW'}" class="badge bg-success">LOW</span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
